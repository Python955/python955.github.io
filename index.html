<!DOCTYPE html>
<html>
<head>
<title>Video Background</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
    }
    @font-face {
      font-family: 'headerfont';
      src: url('Brush Kencur DEMO.ttf') format('truetype');
    }

    h1.rainbow {
        font-family: 'headerfont', sans-serif;
        font-size: 120px;
        background: linear-gradient(
          to right,
          red, orange, yellow, green, blue, indigo, violet
        );
        background-size: 400% auto;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        position: relative;
        z-index: 1;
        text-align: center;
        margin-top: 200px;
      
        animation: rainbowAnimation 6s linear infinite;
      }
      
      @keyframes rainbowAnimation {
        0%   { background-position: 0%   0; }
        100% { background-position: 100% 0; }
      }

    /* Video covers the whole screen */
    #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
    }
  
    .content {
        position: relative;
        z-index: 1;
        color: white;
        text-align: center;
        font-size: 40px;
        margin-top: 200px;
    }
</style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="file_example_MP4_640_3MG.mp4" type="video/mp4">
    </video>

    <div class="content">
        <h1 class="rainbow">Cactus Games</h1>
        <p>Welcome to the Cactus Games website!</p>
    </div>

</body>
</html>
