<!DOCTYPE html>
<html>
<head>
<title>Video Background</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden; /* stops scrolling if you want */
    }

    /* Video covers the whole screen */
    #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;   /* fills background without stretching weirdly */
        z-index: -1;         /* puts it BEHIND your text */
    }

    /* Center text */
    .content {
        position: relative;
        z-index: 1;          /* make sure text is above video */
        color: white;
        text-align: center;
        font-size: 40px;
        margin-top: 200px;
    }
</style>
</head>
<body>

    <!-- Background video -->
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="file_example_MP4_640_3MG.mp4" type="video/mp4">
    </video>

    <!-- Your text -->
    <div class="content">
        <h1>Hello world!</h1>
        <p>This is my first website with a video background!</p>
    </div>

</body>
</html>
