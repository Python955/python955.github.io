<!DOCTYPE html>
<html>
<head>
<title>Video Background</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
    }
    h1.rainbow {
        font-size: 120px;
        background: linear-gradient(
          to right,
          red, orange, yellow, green, blue, indigo, violet
        );
        background-size: 400% auto;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        position: relative;
        z-index: 1;
        color: white;
        text-align: center;
        font-size: 40px;
        margin-top: 200px;
      
        animation: rainbowAnimation 6s linear infinite;
      }
      
      @keyframes rainbowAnimation {
        0%   { background-position: 0%   0; }
        100% { background-position: 100% 0; }
      }

    /* Video covers the whole screen */
    #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
    }
  
    .content {
        position: relative;
        z-index: 1;
        color: white;
        text-align: center;
        font-size: 40px;
        margin-top: 200px;
    }
</style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="file_example_MP4_640_3MG.mp4" type="video/mp4">
    </video>

    <div>
        <h1 class="rainbow">Hello world!/h1>
        <p class="content">This is my first website with a video background!</p>
    </div>

</body>
</html>
