<!DOCTYPE html>
<html>
<head>
<title>Video Background</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
    }
    @font-face {
      font-family: 'headerfont';
      src: url('Brush Kencur DEMO.ttf') format('truetype');
    }
    /* Fade-in animation */
    @keyframes fadeIn {
        0% {
            opacity: 0;
            transform: translateY(20px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    /* Rainbow animated header */
    h1.rainbow {
        font-size: 120px;
        font-family: 'headerfont', sans-serif; /* or your custom font */
        background: linear-gradient(
            to right,
            red, orange, yellow, green, blue, indigo, violet
        );
        background-size: 400% auto;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
    
        animation: rainbowAnimation 6s linear infinite,
                   fadeIn 2s ease-out forwards;
    
        margin: 0;
        padding-top: 150px;
    }


    /* Video covers the whole screen */
    #bg-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
    }
  
    .content {
        position: relative;
        z-index: 1;
        color: white;
        text-align: center;
        font-size: 40px;
        margin-top: 200px;
    }
</style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="file_example_MP4_640_3MG.mp4" type="video/mp4">
    </video>

    <div class="content">
        <h1 class="rainbow">Cactus Games</h1>
        <p>Welcome to the Cactus Games website!</p>
    </div>

</body>
</html>
